# ============================================================================
# Redis configuration for GPS India Loan Portal
#
# Security note: maxmemory-policy MUST be volatile-lru (not allkeys-lru) so
# that Redis only evicts keys that have a TTL set. The token blacklist keys
# (tokenBlacklist:*) carry a TTL matching the JWT expiry, so they are eligible
# for eviction — but only after less-critical cache/OTP keys are evicted first
# (LRU ordering). Keys without a TTL (e.g. any persistent config) are never
# evicted under volatile-lru, preventing silent security gaps.
# ============================================================================

# ---------- Persistence ----------
appendonly yes
appendfsync everysec          # fsync once per second — good balance of durability vs perf

# ---------- Memory ----------
# Tune REDIS_MAXMEMORY via environment variable; default 256 mb for dev.
# Production recommendation: 512 mb – 1 gb depending on blacklist + cache volume.
maxmemory ${REDIS_MAXMEMORY:-256mb}

# CRITICAL: only evict keys that have a TTL (cache entries, OTPs, blacklisted tokens).
# Never evict keys without a TTL. This prevents blacklisted JWTs from being silently
# dropped under memory pressure, which would allow session-replay attacks.
maxmemory-policy volatile-lru

# ---------- Connections ----------
tcp-keepalive 60
timeout 300

# ---------- Slowlog ----------
slowlog-log-slower-than 10000   # log queries slower than 10ms
slowlog-max-len 128
