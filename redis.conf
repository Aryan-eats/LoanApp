# ============================================================================
# Redis configuration for GPS India Loan Portal
#
# Security note: maxmemory-policy MUST be volatile-lru (not allkeys-lru) so
# that Redis only evicts keys that have a TTL set. The token blacklist keys
# (tokenBlacklist:*) carry a TTL matching the JWT expiry, so they are eligible
# for eviction, but only after less-critical cache and OTP keys are evicted
# first (LRU ordering). Keys without a TTL (for example persistent config) are
# never evicted under volatile-lru, preventing silent security gaps.
# ============================================================================

# ---------- Persistence ----------
appendonly yes
# fsync once per second for a balance of durability and performance.
appendfsync everysec

# ---------- Memory ----------
# Tune REDIS_MAXMEMORY via environment variable; default 256 mb for dev.
# Production recommendation: 512 mb to 1 gb depending on blacklist and cache volume.
# maxmemory is supplied by docker-compose on the Redis command line.

# CRITICAL: only evict keys that have a TTL (cache entries, OTPs, blacklisted tokens).
# Never evict keys without a TTL. This prevents blacklisted JWTs from being silently
# dropped under memory pressure, which would allow session-replay attacks.
maxmemory-policy volatile-lru

# ---------- Connections ----------
tcp-keepalive 60
timeout 300

# ---------- Slowlog ----------
# Log queries slower than 10ms.
slowlog-log-slower-than 10000
slowlog-max-len 128
