# ============================================================================
# GPS India Loan Portal — Docker Compose
# Usage:
#   docker compose up                    → Start all services (production-like)
#   docker compose up db redis           → Start only infra (run app locally)
#   docker compose --profile dev up      → Start with hot-reload dev servers
#   docker compose down                  → Stop everything
#   docker compose down -v               → Stop + delete volumes (fresh DB)
# ============================================================================

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loanapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loanapp_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-loanapp}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loanapp}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
    healthcheck:
      # Liveness: ping responds
      # Memory guard: alert (but don't fail) when usage > 80% of maxmemory
      test: |
        redis-cli ping | grep -q PONG &&
        redis-cli INFO memory | awk -F: '
          /used_memory:/ { used=$$2+0 }
          /maxmemory:/ { max=$$2+0 }
          END { if (max>0 && used/max > 0.8) { print "WARN: Redis memory > 80%"; exit 1 } }'
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    command:
      - sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --maxmemory "$${REDIS_MAXMEMORY:-256mb}"

  # ---------- Vault ----------
  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN_DOCKER:-dev-only-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    volumes:
      - vaultdata:/vault/file
    command: vault server -dev -dev-root-token-id=${VAULT_TOKEN_DOCKER:-dev-only-root-token}
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend API (Production) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-loanapp}:${POSTGRES_PASSWORD:-loanapp_dev_pass}@db:5432/${POSTGRES_DB:-loanapp}?schema=public}
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: ${VAULT_ADDR_DOCKER:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN_DOCKER:-dev-only-root-token}
      VAULT_TRANSIT_PATH: ${VAULT_TRANSIT_PATH_DOCKER:-transit}
      VAULT_GPS_INDIA_KEY: ${VAULT_GPS_INDIA_KEY_DOCKER:-gps-india-internal}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE_DOCKER:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      # DB connection is over Docker-internal network — no TLS on the pg container.
      # Set DB_SSL=false here; use DB_SSL=true (the default) for hosted DBs (RDS, Supabase, etc.)
      DB_SSL: ${DB_SSL:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -c
      - npx prisma migrate deploy && node dist/index.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy

  # ---------- Frontend (Production — nginx) ----------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  # ---------- Backend API (Dev — hot reload) ----------
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    profiles: [ "dev" ]
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-loanapp}:${POSTGRES_PASSWORD:-loanapp_dev_pass}@db:5432/${POSTGRES_DB:-loanapp}?schema=public}
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: ${VAULT_ADDR_DOCKER:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN_DOCKER:-dev-only-root-token}
      VAULT_TRANSIT_PATH: ${VAULT_TRANSIT_PATH_DOCKER:-transit}
      VAULT_GPS_INDIA_KEY: ${VAULT_GPS_INDIA_KEY_DOCKER:-gps-india-internal}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE_DOCKER:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -c
      - npx prisma migrate deploy && npx tsx watch src/index.ts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy

  # ---------- Frontend (Dev — Vite HMR) ----------
  frontend-dev:
    image: node:20-alpine
    profiles: [ "dev" ]
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:5000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend-dev

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  vaultdata:
    driver: local
